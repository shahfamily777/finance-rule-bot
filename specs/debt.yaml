# Debt module — edit rules, thresholds, questions, and copy here.
# Run: npm run specs:compile

id: debt

meta:
  label: Debt
  blurb: Help prioritize debt payoff and understand debt decisions.
  hub_intro: |
    Debt module: assess your full debt picture, compare payoff strategies, weigh debt vs investing,
    and estimate a debt-free date. All guidance is rule-based — no predictions or guarantees.

constants:
  starter_emergency_fund_target: 2000
  high_interest_threshold_pct: 8
  low_interest_threshold_pct: 4

sections:
  - id: assessment
    title: Debt Assessment
    description: Review your debts, cash flow, and emergency fund for a clear starting point.
  - id: snowball_avalanche
    title: Debt Snowball vs Avalanche
    description: Compare two common payoff methods and see which fits your style.
  - id: debt_vs_investing
    title: Debt vs Investing
    description: Decide whether extra cash should go to debt payoff or investing.
  - id: debt_free_date
    title: Debt-Free Date Calculator
    description: Estimate when a single debt could be paid off at your current payment.

rules:
  high_interest_debt_pct: 8
  debt_vs_invest_focus_debt_pct: 8
  debt_vs_invest_mixed_low_pct: 4
  debt_vs_invest_mixed_high_pct: 8

snowball_avalanche:
  snowball:
    name: Debt Snowball
    description: Pay the smallest balance first while making minimum payments on everything else.
    benefits:
      - Quick wins as balances disappear
      - Builds motivation through visible progress
      - Simple to follow — one target at a time
    drawbacks:
      - May pay more total interest than avalanche
  avalanche:
    name: Debt Avalanche
    description: Pay the highest interest rate first while making minimum payments on everything else.
    benefits:
      - Saves the most money in total interest
      - Mathematically optimal payoff order
    drawbacks:
      - Progress may feel slower if the highest-rate debt is large
  comparison:
    - dimension: Order of payoff
      snowball: Smallest balance first
      avalanche: Highest interest rate first
    - dimension: Total interest paid
      snowball: Often higher
      avalanche: Usually lower
    - dimension: Psychological momentum
      snowball: Strong — quick wins
      avalanche: Weaker if top-rate debt is large
    - dimension: Best for
      snowball: Motivation and quick wins
      avalanche: Minimizing total interest

debt_vs_investing:
  focus_debt:
    headline: Focus on debt payoff first
    condition: Debt interest rate is {debt_vs_invest_focus_debt_pct}% or higher
    reasoning: |
      At this rate, paying down debt is often equivalent to a guaranteed return that is hard to match
      in the market after taxes and risk. Extra cash flow is usually better directed at reducing this
      balance before aggressive investing beyond an employer match.
  mixed:
    headline: A mixed strategy may be reasonable
    condition: Debt interest rate is between {debt_vs_invest_mixed_low_pct}% and {debt_vs_invest_mixed_high_pct}%
    reasoning: |
      At moderate rates, the math is closer. Some people split extra cash between debt payoff and
      investing — especially if they are capturing an employer 401(k) match and have a starter emergency fund.
      There is no single right answer; it depends on your comfort with debt and your timeline.
  consider_investing:
    headline: Investing may deserve consideration
    condition: Debt interest rate is below {debt_vs_invest_mixed_low_pct}%
    reasoning: |
      Low-rate debt (such as some mortgages or subsidized student loans) often costs less than long-term
      investment returns might earn — but returns are not guaranteed. If you have high-interest debt
      elsewhere, address that first regardless of this rate.

assessment:
  wins:
    no_credit_card: No credit card debt
    positive_cash_flow: Positive monthly cash flow
    emergency_fund: Emergency fund established
    low_interest_only: Low interest debt only
    consistent_payments: Consistent debt payments
  watch:
    high_interest_cc: High-interest credit card debt
    emergency_fund_low: Emergency fund below target
    multiple_high_interest: Multiple high-interest loans
    negative_cash_flow: Negative monthly cash flow

direct_answers:
  snowball_rule: The debt snowball pays the smallest balance first for quick wins and motivation.
  avalanche_rule: The debt avalanche pays the highest interest rate first to minimize total interest.
  high_interest_first: Pay high-interest debt (around {high_interest_debt_pct}% or above) before investing extra beyond basics.
  emergency_before_aggressive: Build a starter emergency fund (~${starter_emergency_fund_target}) before aggressive debt payoff if you have none.

messages:
  disclaimer: Rule-based educational guidance. Not financial advice. No guarantees on investment returns or payoff timelines.
  assessment_intro: Enter your balances and rates for a calm, factual assessment of where you stand.
